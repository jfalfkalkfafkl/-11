<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль | CSS Templates Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
        }

        :root {
            --primary-cyan: #00ffff;
            --primary-pink: #ff00ff;
            --primary-purple: #7c3aed;
            --dark-bg: #0f051a;
            --darker-bg: #0a0315;
            --card-bg: rgba(0, 255, 255, 0.05);
            --border-color: rgba(0, 255, 255, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --glow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        body {
            background: var(--darker-bg);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(255, 0, 255, 0.05) 0%, transparent 50%);
            z-index: -5;
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            z-index: -4;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -3;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--primary-cyan);
            border-radius: 50%;
            box-shadow: 0 0 5px var(--primary-cyan);
            animation: float 15s infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .scanlines::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(transparent 0%, rgba(0, 255, 255, 0.03) 50%, transparent 100%);
            background-size: 100% 4px;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1rem 2rem;
            background: rgba(15, 15, 35, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            z-index: 10000;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-cyan);
            text-shadow: 0 0 15px var(--primary-cyan);
            text-decoration: none;
        }

        .logo::before { content: '>'; margin-right: 0.5rem; color: var(--primary-pink); }
        .logo::after { content: '_'; animation: blink 1s infinite; }

        @keyframes blink { 0%,50%{opacity:1;} 51%,100%{opacity:0;} }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2.5rem;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .nav-links a:hover { color: var(--primary-cyan); text-shadow: 0 0 10px var(--primary-cyan); }

        .cyber-button {
            background: linear-gradient(135deg, var(--primary-cyan), var(--primary-purple));
            color: var(--darker-bg);
            padding: 0.7rem 1.5rem;
            text-decoration: none;
            font-weight: bold;
            clip-path: polygon(10px 0%, 100% 0%, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0% 100%, 0% 10px);
            transition: all 0.3s ease;
            display: inline-block;
            border: none;
            cursor: pointer;
        }

        .cyber-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px var(--primary-cyan);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 2rem 2rem;
        }

        .section-title {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 2rem;
            color: var(--primary-cyan);
            text-shadow: 0 0 10px var(--primary-cyan);
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .tab-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.5rem 1.5rem;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .tab-btn.active {
            border-color: var(--primary-cyan);
            color: var(--primary-cyan);
            box-shadow: 0 0 10px var(--primary-cyan);
        }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 2rem;
            backdrop-filter: blur(5px);
            margin-bottom: 2rem;
            clip-path: polygon(15px 0%, 100% 0%, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0% 100%, 0% 15px);
        }

        .auth-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--primary-cyan);
        }

        .input-group input {
            width: 100%;
            padding: 0.8rem;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
            color: white;
            font-family: inherit;
        }

        .auth-btn {
            background: var(--primary-cyan);
            color: black;
            border: none;
            padding: 0.8rem;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
            clip-path: polygon(10px 0%, 100% 0%, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0% 100%, 0% 10px);
            transition: 0.3s;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px var(--primary-cyan);
        }

        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .profile-grid { grid-template-columns: 1fr; }
            .nav-links { display: none; }
        }

        .avatar-container {
            width: 150px;
            height: 150px;
            margin: 0 auto;
            position: relative;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-cyan);
        }

        .avatar-placeholder {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-cyan), var(--primary-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
        }

        .avatar-upload {
            position: absolute;
            bottom: 0;
            right: 0;
            background: var(--primary-cyan);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .profile-tabs {
            display: flex;
            gap: 1rem;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .profile-tab {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-weight: bold;
        }

        .profile-tab.active {
            color: var(--primary-cyan);
            border-bottom: 2px solid var(--primary-cyan);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            border: 1px solid var(--primary-cyan);
            padding: 1rem 2rem;
            z-index: 10002;
            display: none;
            backdrop-filter: blur(10px);
        }

        .notification.show { display: block; }

        .switch-group {
            display: flex;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--primary-cyan); }
        input:checked + .slider:before { transform: translateX(26px); }

        .footer-legal {
            text-align: center;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .recovery-step {
            max-width: 500px;
            margin: 0 auto;
        }

        .recovery-step .input-group {
            margin-bottom: 1.2rem;
        }

        .recovery-step .step-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="cyber-bg"></div>
    <div class="grid-overlay"></div>
    <div class="particles" id="particles"></div>
    <div class="scanlines"></div>

    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">CSS.HUB</a>
            <ul class="nav-links">
                <li><a href="index.html">Главная</a></li>
                <li><a href="index2.html">Профиль</a></li>
                <li><a href="index3.html">О нас</a></li>
            </ul>
            <div class="nav-bottom">
                <a href="index2.html" class="cyber-button">Войти</a>
            </div>
        </div>
    </nav>

    <div id="notification" class="notification"></div>

    <div class="container">
        <h1 class="section-title">🔐 Личный кабинет</h1>
        <div class="tabs" id="mainTabs">
            <button class="tab-btn active" data-tab="auth">Вход / Регистрация</button>
            <button class="tab-btn" data-tab="recovery">Восстановление</button>
        </div>
        <div id="content"></div>
        <div class="footer-legal">
            <span>© 2025 CSS Templates Hub</span>
            <span>|</span>
            <a href="#">Политика конфиденциальности</a>
            <span>|</span>
            <a href="#">Пользовательское соглашение</a>
        </div>
    </div>

    <script>
        // ---------- Storage keys ----------
        const USERS_KEY = 'css_users';
        const CURRENT_USER_KEY = 'css_current_user';
        const FAVORITES_KEY = 'css_favorites';
        const HISTORY_KEY = 'css_history';
        const RECOVERY_KEY = 'css_recovery';

        // ---------- Helpers ----------
        function showNotification(msg, type = 'info') {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 3000);
        }

        function getUsers() { return JSON.parse(localStorage.getItem(USERS_KEY)) || []; }
        function saveUsers(users) { localStorage.setItem(USERS_KEY, JSON.stringify(users)); }
        function getCurrentUser() { return JSON.parse(localStorage.getItem(CURRENT_USER_KEY)); }
        function setCurrentUser(user) {
            if (user) {
                localStorage.setItem(CURRENT_USER_KEY, JSON.stringify(user));
                addLoginHistory(user.email);
            } else {
                localStorage.removeItem(CURRENT_USER_KEY);
            }
        }

        function addLoginHistory(email) {
            const history = JSON.parse(localStorage.getItem(HISTORY_KEY)) || {};
            if (!history[email]) history[email] = [];
            history[email].unshift({ date: new Date().toLocaleString(), device: 'Компьютер' });
            if (history[email].length > 10) history[email].pop();
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        }
        function getLoginHistory(email) { return (JSON.parse(localStorage.getItem(HISTORY_KEY)) || {})[email] || []; }

        function getFavorites(email) { return (JSON.parse(localStorage.getItem(FAVORITES_KEY)) || {})[email] || []; }
        function addFavorite(email, template) {
            const favs = JSON.parse(localStorage.getItem(FAVORITES_KEY)) || {};
            if (!favs[email]) favs[email] = [];
            if (!favs[email].some(f => f.id === template.id)) favs[email].push(template);
            localStorage.setItem(FAVORITES_KEY, JSON.stringify(favs));
        }
        function removeFavorite(email, templateId) {
            const favs = JSON.parse(localStorage.getItem(FAVORITES_KEY)) || {};
            if (favs[email]) favs[email] = favs[email].filter(f => f.id !== templateId);
            localStorage.setItem(FAVORITES_KEY, JSON.stringify(favs));
        }

        function validateEmail(email) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }
        function validatePassword(pwd) { return pwd.length >= 6; }

        // ---------- Auth ----------
        function register(name, email, pwd, confirm) {
            if (!name || !email || !pwd || !confirm) { showNotification('Заполните все поля', 'error'); return false; }
            if (!validateEmail(email)) { showNotification('Неверный email', 'error'); return false; }
            if (!validatePassword(pwd)) { showNotification('Пароль не менее 6 символов', 'error'); return false; }
            if (pwd !== confirm) { showNotification('Пароли не совпадают', 'error'); return false; }
            const users = getUsers();
            if (users.find(u => u.email === email)) { showNotification('Email уже занят', 'error'); return false; }
            const newUser = { id: Date.now(), name, email, password: pwd, avatar: null, registeredAt: new Date().toISOString(), settings: { emailNotifications: true } };
            users.push(newUser);
            saveUsers(users);
            setCurrentUser(newUser);
            showNotification('Регистрация успешна!', 'success');
            renderProfile();
            return true;
        }

        function login(email, pwd) {
            const users = getUsers();
            const user = users.find(u => u.email === email && u.password === pwd);
            if (user) { setCurrentUser(user); showNotification('Вход выполнен', 'success'); renderProfile(); return true; }
            showNotification('Неверный email или пароль', 'error');
            return false;
        }

        function logout() { setCurrentUser(null); renderAuthForms(); showNotification('Вы вышли', 'info'); }

        // ---------- Profile management ----------
        function updateProfile(updates) {
            const user = getCurrentUser();
            if (!user) return;
            const users = getUsers();
            const idx = users.findIndex(u => u.email === user.email);
            if (idx !== -1) {
                users[idx] = { ...users[idx], ...updates };
                saveUsers(users);
                setCurrentUser(users[idx]);
                showNotification('Профиль обновлён', 'success');
                renderProfile();
            }
        }

        function uploadAvatar(file) {
            if (!file.type.startsWith('image/')) { showNotification('Требуется изображение', 'error'); return; }
            if (file.size > 2 * 1024 * 1024) { showNotification('Максимум 2MB', 'error'); return; }
            const reader = new FileReader();
            reader.onload = e => updateProfile({ avatar: e.target.result });
            reader.readAsDataURL(file);
        }

        function changePassword(oldPwd, newPwd, confirmPwd) {
            const user = getCurrentUser();
            if (!user) return false;
            if (user.password !== oldPwd) { showNotification('Неверный текущий пароль', 'error'); return false; }
            if (!validatePassword(newPwd)) { showNotification('Новый пароль не менее 6 символов', 'error'); return false; }
            if (newPwd !== confirmPwd) { showNotification('Пароли не совпадают', 'error'); return false; }
            updateProfile({ password: newPwd });
            showNotification('Пароль изменён', 'success');
            return true;
        }

        function deleteAccount() {
            if (!confirm('Удалить аккаунт навсегда? Это действие необратимо.')) return;
            const user = getCurrentUser();
            if (!user) return;
            let users = getUsers();
            users = users.filter(u => u.email !== user.email);
            saveUsers(users);
            localStorage.removeItem(CURRENT_USER_KEY);
            showNotification('Аккаунт удалён', 'info');
            renderAuthForms();
        }

        // ---------- Recovery (6-digit code simulation) ----------
        function generateRecoveryCode(email) {
            const users = getUsers();
            const userExists = users.some(u => u.email === email);
            if (!userExists) {
                showNotification('Пользователь с таким email не найден', 'error');
                return null;
            }
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            const expiresAt = Date.now() + 5 * 60 * 1000; // 5 минут
            const recoveryData = {
                email: email,
                code: code,
                expiresAt: expiresAt
            };
            localStorage.setItem(RECOVERY_KEY, JSON.stringify(recoveryData));
            // Имитация отправки на email: показываем код в alert
            alert(`🔐 Код восстановления для ${email}: ${code}\nКод действителен 5 минут. (В реальном проекте код приходит на почту)`);
            showNotification('Код отправлен (проверьте alert)', 'info');
            return code;
        }

        function verifyRecoveryCode(enteredCode) {
            const raw = localStorage.getItem(RECOVERY_KEY);
            if (!raw) {
                showNotification('Код не найден. Запросите новый.', 'error');
                return null;
            }
            const data = JSON.parse(raw);
            if (Date.now() > data.expiresAt) {
                localStorage.removeItem(RECOVERY_KEY);
                showNotification('Срок действия кода истёк. Запросите новый.', 'error');
                return null;
            }
            if (data.code !== enteredCode) {
                showNotification('Неверный код', 'error');
                return null;
            }
            return data.email;
        }

        function resetPassword(email, newPassword, confirmPassword) {
            if (!validatePassword(newPassword)) { showNotification('Пароль не менее 6 символов', 'error'); return false; }
            if (newPassword !== confirmPassword) { showNotification('Пароли не совпадают', 'error'); return false; }
            const users = getUsers();
            const idx = users.findIndex(u => u.email === email);
            if (idx === -1) { showNotification('Ошибка: пользователь не найден', 'error'); return false; }
            users[idx].password = newPassword;
            saveUsers(users);
            localStorage.removeItem(RECOVERY_KEY);
            showNotification('Пароль успешно изменён. Теперь войдите с новым паролем.', 'success');
            return true;
        }

        // ---------- UI Rendering ----------
        function renderAuthForms() {
            const container = document.getElementById('content');
            container.innerHTML = `
                <div class="auth-container">
                    <div class="glass-card">
                        <h3>Регистрация</h3>
                        <div class="input-group"><label>Имя</label><input type="text" id="regName"></div>
                        <div class="input-group"><label>Email</label><input type="email" id="regEmail"></div>
                        <div class="input-group"><label>Пароль</label><input type="password" id="regPwd"></div>
                        <div class="input-group"><label>Подтвердите</label><input type="password" id="regConfirm"></div>
                        <button class="auth-btn" id="registerBtn">Зарегистрироваться</button>
                    </div>
                    <div class="glass-card">
                        <h3>Вход</h3>
                        <div class="input-group"><label>Email</label><input type="email" id="loginEmail"></div>
                        <div class="input-group"><label>Пароль</label><input type="password" id="loginPwd"></div>
                        <button class="auth-btn" id="loginBtn">Войти</button>
                        <button class="link-btn" id="forgotBtn" style="background:none; border:none; color:var(--primary-cyan); margin-top:1rem; cursor:pointer; width:100%;">Забыли пароль?</button>
                    </div>
                </div>
            `;
            document.getElementById('registerBtn').addEventListener('click', () => {
                register(document.getElementById('regName').value, document.getElementById('regEmail').value,
                    document.getElementById('regPwd').value, document.getElementById('regConfirm').value);
            });
            document.getElementById('loginBtn').addEventListener('click', () => {
                login(document.getElementById('loginEmail').value, document.getElementById('loginPwd').value);
            });
            document.getElementById('forgotBtn').addEventListener('click', () => {
                const loginEmail = document.getElementById('loginEmail').value;
                document.querySelector('[data-tab="recovery"]').click();
                // небольшая задержка чтобы вкладка отрисовалась, потом предзаполним email
                setTimeout(() => {
                    const emailInput = document.getElementById('recoveryEmail');
                    if (emailInput && loginEmail) emailInput.value = loginEmail;
                }, 50);
            });
        }

        let recoveryStep = 1; // 1: email, 2: code, 3: new password
        let recoveryEmailCache = '';

        function renderRecoveryForm() {
            const container = document.getElementById('content');
            container.innerHTML = `
                <div class="glass-card recovery-step">
                    <div id="recoveryStepContainer">
                        <!-- Step content dynamically injected -->
                    </div>
                </div>
            `;
            updateRecoveryStepUI();
        }

        function updateRecoveryStepUI() {
            const stepContainer = document.getElementById('recoveryStepContainer');
            if (!stepContainer) return;
            if (recoveryStep === 1) {
                stepContainer.innerHTML = `
                    <h3>Шаг 1: Введите email</h3>
                    <div class="input-group"><label>Email</label><input type="email" id="recoveryEmail" placeholder="your@email.com"></div>
                    <div class="step-buttons"><button class="cyber-button" id="sendCodeBtn">Отправить код</button>
                    <button class="cyber-button" id="backToAuthBtn" style="background:transparent; border:1px solid var(--primary-cyan);">Назад</button></div>
                `;
                document.getElementById('sendCodeBtn')?.addEventListener('click', () => {
                    const email = document.getElementById('recoveryEmail').value.trim();
                    if (!validateEmail(email)) { showNotification('Введите корректный email', 'error'); return; }
                    const codeResult = generateRecoveryCode(email);
                    if (codeResult) {
                        recoveryEmailCache = email;
                        recoveryStep = 2;
                        updateRecoveryStepUI();
                    }
                });
                document.getElementById('backToAuthBtn')?.addEventListener('click', () => {
                    document.querySelector('[data-tab="auth"]').click();
                });
            } else if (recoveryStep === 2) {
                stepContainer.innerHTML = `
                    <h3>Шаг 2: Подтверждение кода</h3>
                    <p>Код отправлен на ${recoveryEmailCache}</p>
                    <div class="input-group"><label>6-значный код</label><input type="text" id="recoveryCode" maxlength="6" placeholder="XXXXXX"></div>
                    <div class="step-buttons"><button class="cyber-button" id="verifyCodeBtn">Проверить код</button>
                    <button class="cyber-button" id="resendCodeBtn" style="background:transparent;">Отправить заново</button></div>
                `;
                document.getElementById('verifyCodeBtn')?.addEventListener('click', () => {
                    const code = document.getElementById('recoveryCode').value.trim();
                    if (!code) { showNotification('Введите код', 'error'); return; }
                    const verifiedEmail = verifyRecoveryCode(code);
                    if (verifiedEmail) {
                        recoveryEmailCache = verifiedEmail;
                        recoveryStep = 3;
                        updateRecoveryStepUI();
                    }
                });
                document.getElementById('resendCodeBtn')?.addEventListener('click', () => {
                    if (recoveryEmailCache && validateEmail(recoveryEmailCache)) {
                        generateRecoveryCode(recoveryEmailCache);
                        showNotification('Новый код отправлен', 'info');
                    } else {
                        showNotification('Ошибка, начните заново', 'error');
                        recoveryStep = 1;
                        updateRecoveryStepUI();
                    }
                });
            } else if (recoveryStep === 3) {
                stepContainer.innerHTML = `
                    <h3>Шаг 3: Новый пароль</h3>
                    <div class="input-group"><label>Новый пароль (мин. 6 символов)</label><input type="password" id="newPwd"></div>
                    <div class="input-group"><label>Подтвердите пароль</label><input type="password" id="confirmPwd"></div>
                    <div class="step-buttons"><button class="cyber-button" id="resetPwdBtn">Сбросить пароль</button>
                    <button class="cyber-button" id="cancelResetBtn" style="background:transparent;">Отмена</button></div>
                `;
                document.getElementById('resetPwdBtn')?.addEventListener('click', () => {
                    const newPwd = document.getElementById('newPwd').value;
                    const confirmPwd = document.getElementById('confirmPwd').value;
                    if (resetPassword(recoveryEmailCache, newPwd, confirmPwd)) {
                        // очищаем всё и переключаем на вход
                        localStorage.removeItem(RECOVERY_KEY);
                        recoveryStep = 1;
                        recoveryEmailCache = '';
                        document.querySelector('[data-tab="auth"]').click();
                    }
                });
                document.getElementById('cancelResetBtn')?.addEventListener('click', () => {
                    recoveryStep = 1;
                    recoveryEmailCache = '';
                    renderRecoveryForm();
                });
            }
        }

        // ---------- Profile Tabs Content ----------
        function renderProfileInfo(user) {
            return `<div><strong>Имя:</strong> ${user.name}</div>
                    <div><strong>Email:</strong> ${user.email}</div>
                    <div><strong>Дата регистрации:</strong> ${new Date(user.registeredAt).toLocaleDateString()}</div>`;
        }

        function renderFavorites(user, favorites) {
            if (!favorites.length) return '<div class="empty-state">Нет избранных шаблонов</div>';
            return `<div class="favorites-list">${favorites.map(f => `<div><strong>${f.name}</strong><br>${f.desc || ''}<br><button class="cyber-button" style="padding:0.2rem 0.5rem; font-size:0.8rem; margin-top:0.5rem;" data-id="${f.id}">Удалить</button></div><hr>`).join('')}</div>`;
        }

        function renderHistory(history) {
            if (!history.length) return '<div class="empty-state">История пуста</div>';
            return `<div>${history.map(h => `<div>${h.date} — ${h.device}</div>`).join('')}</div>`;
        }

        function renderSettings(user) {
            return `<div class="switch-group"><span>Email-уведомления</span><label class="switch"><input type="checkbox" id="emailNotif" ${user.settings?.emailNotifications ? 'checked' : ''}><span class="slider"></span></label></div>
                    <div><button class="auth-btn" id="changePwdSettingsBtn" style="margin-top:1rem;">Изменить пароль</button></div>
                    <div><button class="auth-btn" id="deleteAccountBtn" style="margin-top:1rem; background:#ff4444;">Удалить аккаунт</button></div>`;
        }

        function renderProfile() {
            const user = getCurrentUser();
            if (!user) return renderAuthForms();
            const container = document.getElementById('content');
            const avatarHtml = user.avatar ? `<img src="${user.avatar}" class="avatar">` : `<div class="avatar-placeholder">${user.name[0].toUpperCase()}</div>`;
            const history = getLoginHistory(user.email);
            const favorites = getFavorites(user.email);
            container.innerHTML = `
                <div class="profile-grid">
                    <div class="glass-card">
                        <div class="avatar-container">
                            ${avatarHtml}
                            <div class="avatar-upload"><i class="fas fa-camera"></i><input type="file" id="avatarInput" accept="image/*"></div>
                        </div>
                        <h3 style="text-align:center;">${user.name}</h3>
                        <p style="text-align:center;">${user.email}</p>
                        <div class="user-stats" style="margin-top:1rem;">
                            <div>📅 Регистрация: ${new Date(user.registeredAt).toLocaleDateString()}</div>
                            <div>❤️ Избранное: ${favorites.length}</div>
                        </div>
                    </div>
                    <div class="glass-card">
                        <div class="profile-tabs" id="profileTabs">
                            <button class="profile-tab active" data-tab="info">Информация</button>
                            <button class="profile-tab" data-tab="favorites">Избранное</button>
                            <button class="profile-tab" data-tab="history">История</button>
                            <button class="profile-tab" data-tab="settings">Настройки</button>
                        </div>
                        <div id="profileContent">
                            ${renderProfileInfo(user)}
                        </div>
                        <div style="margin-top:2rem; text-align:right;">
                            <button class="cyber-button" id="logoutBtn" style="background:transparent; border:1px solid var(--primary-cyan);">Выйти</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('avatarInput')?.addEventListener('change', e => { if (e.target.files[0]) uploadAvatar(e.target.files[0]); });
            document.getElementById('logoutBtn')?.addEventListener('click', logout);
            const tabs = document.querySelectorAll('#profileTabs .profile-tab');
            const contentDiv = document.getElementById('profileContent');
            const switchContent = (tabName) => {
                if (tabName === 'info') contentDiv.innerHTML = renderProfileInfo(user);
                else if (tabName === 'favorites') contentDiv.innerHTML = renderFavorites(user, favorites);
                else if (tabName === 'history') contentDiv.innerHTML = renderHistory(history);
                else if (tabName === 'settings') contentDiv.innerHTML = renderSettings(user);
                if (tabName === 'settings') {
                    document.getElementById('emailNotif')?.addEventListener('change', (e) => updateProfile({ settings: { ...user.settings, emailNotifications: e.target.checked } }));
                    document.getElementById('changePwdSettingsBtn')?.addEventListener('click', () => {
                        const oldPwd = prompt('Введите текущий пароль');
                        const newPwd = prompt('Введите новый пароль (мин. 6 символов)');
                        const confirmPwd = prompt('Подтвердите новый пароль');
                        if (oldPwd && newPwd && confirmPwd) changePassword(oldPwd, newPwd, confirmPwd);
                    });
                    document.getElementById('deleteAccountBtn')?.addEventListener('click', () => deleteAccount());
                }
            };
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    switchContent(tab.dataset.tab);
                });
            });
        }

        // ---------- Init ----------
        function init() {
            // particles
            const particles = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 20 + 's';
                p.style.animationDuration = 10 + Math.random() * 20 + 's';
                particles.appendChild(p);
            }

            const mainTabs = document.querySelectorAll('#mainTabs .tab-btn');
            mainTabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    mainTabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    if (tab.dataset.tab === 'auth') {
                        const user = getCurrentUser();
                        user ? renderProfile() : renderAuthForms();
                    } else {
                        recoveryStep = 1;
                        recoveryEmailCache = '';
                        renderRecoveryForm();
                    }
                });
            });
            const user = getCurrentUser();
            user ? renderProfile() : renderAuthForms();
        }
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
